name: Deploy dist to rental server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required build secrets
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_UPDATES_CONTENTS_ID: ${{ secrets.VITE_UPDATES_CONTENTS_ID }}
          VITE_RACE_SCHEDULE_CONTENTS_ID: ${{ secrets.VITE_RACE_SCHEDULE_CONTENTS_ID }}
          VITE_EVENT_SCHEDULE_CONTENTS_ID: ${{ secrets.VITE_EVENT_SCHEDULE_CONTENTS_ID }}
        run: |
          test -n "$VITE_API_URL" || { echo "Missing secret: VITE_API_URL"; exit 1; }
          test -n "$VITE_API_KEY" || { echo "Missing secret: VITE_API_KEY"; exit 1; }
          test -n "$VITE_UPDATES_CONTENTS_ID" || { echo "Missing secret: VITE_UPDATES_CONTENTS_ID"; exit 1; }
          test -n "$VITE_RACE_SCHEDULE_CONTENTS_ID" || { echo "Missing secret: VITE_RACE_SCHEDULE_CONTENTS_ID"; exit 1; }
          test -n "$VITE_EVENT_SCHEDULE_CONTENTS_ID" || { echo "Missing secret: VITE_EVENT_SCHEDULE_CONTENTS_ID"; exit 1; }

      - name: Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_UPDATES_CONTENTS_ID: ${{ secrets.VITE_UPDATES_CONTENTS_ID }}
          VITE_RACE_SCHEDULE_CONTENTS_ID: ${{ secrets.VITE_RACE_SCHEDULE_CONTENTS_ID }}
          VITE_EVENT_SCHEDULE_CONTENTS_ID: ${{ secrets.VITE_EVENT_SCHEDULE_CONTENTS_ID }}
        run: npm run build

      - name: Deploy dist via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: dist/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          exclude: |
            **/.DS_Store
            **/.ftp-deploy-sync-state.json
